kind = "web"
previewPath = "/"
title = "SafeRide AI"
version = "1.0.0"
id = "artifacts/saferide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19662

[services.development]
run = "pnpm --filter @workspace/saferide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saferide", "run", "build" ]
publicDir = "artifacts/saferide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19662"
BASE_PATH = "/"
